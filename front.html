<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم البطاقة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { box-sizing: border-box; font-family: 'Cairo', Arial, sans-serif; }
        body { background-color: #f1f5f9; margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; background: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 15px; }
        .editor-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 900px) { .editor-layout { grid-template-columns: 280px 1fr; } }
        .control-panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .control-group input[type="range"] { width: 100%; accent-color: #2e7d32; }
        .nudge-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 150px; margin: 15px auto; }
        .nudge-btn { background-color: #cbd5e1; border: none; border-radius: 6px; padding: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .draggable { position: absolute; cursor: move; user-select: none; padding: 1px 4px; border: 1px dashed transparent; }
        .ar-element { font-family: 'Arial', sans-serif; font-weight: bold; }
        .he-element { font-family: 'Arial Hebrew', 'Arial', sans-serif; font-weight: bold; }
        .draggable.selected { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.1); z-index: 999; }
        .workspace-container { width: 100%; overflow-x: auto; background: #e2e8f0; padding: 15px; border-radius: 12px; }
    </style>
    
    <style>
        .workspace { position: relative; width: 1000px; height: 600px; background-image: url('https://i.imgur.com/iQYmB7u.png'); background-size: cover; }
        .stamp { width: 150px; height: 150px; background-image: url('https://i.imgur.com/1bkld35.png'); background-size: contain; background-repeat: no-repeat; }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor-layout">
            <div class="control-panel">
                <h3>أدوات التعديل</h3>
                <div id="active-el-name">لا يوجد عنصر</div>
                <div class="nudge-container">
                    <button class="nudge-btn" onclick="nudge('up')">▲</button>
                    <button class="nudge-btn" onclick="nudge('left')">◀</button>
                    <button class="nudge-btn" onclick="nudge('right')">▶</button>
                    <button class="nudge-btn" onclick="nudge('down')">▼</button>
                </div>
            </div>
            <div class="workspace-container">
                <div class="workspace" id="ws"></div>
            </div>
        </div>
    </div>
    <script>
        
        let activeElement = null;
        function makeDraggable(elmnt, name) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.addEventListener('mousedown', dragMouseDown);
            function selectEl() {
                if (activeElement) activeElement.classList.remove('selected');
                activeElement = elmnt; activeElement.classList.add('selected');
                document.getElementById('active-el-name').innerText = name;
            }
            function dragMouseDown(e) {
                e.preventDefault(); selectEl();
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                    pos3 = e.clientX; pos4 = e.clientY;
                    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                };
            }
        }
        function nudge(dir) {
            if (!activeElement) return;
            if (dir === 'up') activeElement.style.top = (parseInt(activeElement.style.top) - 1) + 'px';
            if (dir === 'down') activeElement.style.top = (parseInt(activeElement.style.top) + 1) + 'px';
            if (dir === 'left') activeElement.style.left = (parseInt(activeElement.style.left) - 1) + 'px';
            if (dir === 'right') activeElement.style.left = (parseInt(activeElement.style.left) + 1) + 'px';
        }

        const data = JSON.parse(localStorage.getItem('pal_id_data'));
        const ws = document.getElementById('ws');
        
        function addEl(text, top, left, className, name) {
            const div = document.createElement('div');
            div.className = 'draggable ' + className;
            div.innerText = text;
            div.style.top = top; div.style.left = left;
            ws.appendChild(div);
            makeDraggable(div, name);
        }
        
        // Add text and Stamp
        addEl(data.firstNameAr, '200px', '500px', 'ar-element', 'الاسم عربي');
        addEl(data.firstNameHe, '230px', '500px', 'he-element', 'الاسم عبري');
        
        const stamp = document.createElement('div');
        stamp.className = 'draggable stamp';
        stamp.style.top = '300px'; stamp.style.left = '100px';
        ws.appendChild(stamp);
        makeDraggable(stamp, 'الختم');
    </script>
</body>
</html>
