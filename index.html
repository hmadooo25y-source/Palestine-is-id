<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات الهوية الفلسطينية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Cairo', Arial, sans-serif;
        }
        
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 15px;
            color: #1e293b;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 20px;
            border-top: 6px solid #2e7d32;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: #1b5e20;
            font-size: 22px;
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        header p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }

        .section-title {
            background: #f1f8e9;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 15px;
            border-right: 4px solid #2e7d32;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media(min-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 1;
        }

        @media(min-width: 600px) {
            .form-group.full-width {
                grid-column: span 2;
            }
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        .lang-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            margin-right: 5px;
            font-weight: bold;
        }

        .ar-badge {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .he-badge {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
            background-color: #f8fafc;
        }

        input[type="text"]:focus {
            border-color: #2e7d32;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
        }

        .file-upload-box {
            border: 2px dashed #2e7d32;
            background-color: #f9fbf7;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .file-upload-box:hover {
            background-color: #f1f8e9;
        }

        .photo-preview {
            width: 90px;
            height: 110px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin: 10px auto 0 auto;
            display: none;
            object-fit: cover;
        }

        .btn-submit {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
        }

        .btn-submit:hover {
            background-color: #1b5e20;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>نظام إدارة وتخصيص الهوية الفلسطينية</h1>
            <p>الخطوة 1: يرجى ملء البيانات باللغتين العربية والعبرية بدقة</p>
        </header>

        <form id="dataForm">
            <!-- الصورة الشخصية والرقم العام -->
            <div class="section-title">الصورة الشخصية ورقم الهوية</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>تحميل الصورة الشخصية:</label>
                    <div class="file-upload-box" onclick="document.getElementById('photo-input').click()">
                        <span id="upload-text" style="font-size: 13px; color: #556b2f;">اضغط هنا لاختيار صورة</span>
                        <input type="file" id="photo-input" accept="image/*" style="display: none;">
                        <img id="photo-preview" class="photo-preview">
                    </div>
                </div>
                <div class="form-group" style="justify-content: center;">
                    <label>رقم الهوية (9 خانات):</label>
                    <input type="text" id="id-number" value="406064576" placeholder="مثال: 406064576" required>
                </div>
            </div>

            <!-- الاسم والنسب ونسب الأب والجد والأم -->
            <div class="section-title">بيانات الاسم والنسب</div>
            <div class="form-grid">
                <!-- الاسم الشخصي -->
                <div class="form-group">
                    <label>الاسم الشخصي <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="first-name-ar" value="مروة" required>
                </div>
                <div class="form-group">
                    <label>الاسم الشخصي <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="first-name-he" value="מרוה" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- اسم الأب -->
                <div class="form-group">
                    <label>اسم الأب <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="father-name-ar" value="رائد" required>
                </div>
                <div class="form-group">
                    <label>اسم الأب <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="father-name-he" value="ראיد" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- اسم الجد -->
                <div class="form-group">
                    <label>اسم الجد <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="grand-name-ar" value="عبد العزيز" required>
                </div>
                <div class="form-group">
                    <label>اسم الجد <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="grand-name-he" value="עבד אלעזיז" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- اسم العائلة -->
                <div class="form-group">
                    <label>اسم العائلة <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="family-name-ar" value="يونس" required>
                </div>
                <div class="form-group">
                    <label>اسم العائلة <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="family-name-he" value="יונס" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- اسم الأم -->
                <div class="form-group">
                    <label>اسم الأم <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="mother-name-ar" value="عليه" required>
                </div>
                <div class="form-group">
                    <label>اسم الأم <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="mother-name-he" value="עליה" style="text-align: left; direction: ltr;" required>
                </div>
            </div>

            <!-- تفاصيل الولادة والإصدار والديانة -->
            <div class="section-title">التفاصيل الشخصية والإصدار</div>
            <div class="form-grid">
                <!-- تاريخ الميلاد -->
                <div class="form-group">
                    <label>تاريخ الميلاد <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="dob-ar" value="30/07/2000" required>
                </div>
                <div class="form-group">
                    <label>تاريخ الميلاد <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="dob-he" value="30/07/2000" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- مكان الولادة -->
                <div class="form-group">
                    <label>مكان الولادة <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="pob-ar" value="خان يونس" required>
                </div>
                <div class="form-group">
                    <label>مكان الولادة <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="pob-he" value="חאן יונس" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- الجنس -->
                <div class="form-group">
                    <label>الجنس <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="gender-ar" value="أنثى" required>
                </div>
                <div class="form-group">
                    <label>الجنس <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="gender-he" value="נקבה" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- الديانة -->
                <div class="form-group">
                    <label>الديانة <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="religion-ar" value="مسلمة" required>
                </div>
                <div class="form-group">
                    <label>الديانة <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="religion-he" value="מוסלמי" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- مكان الإصدار -->
                <div class="form-group">
                    <label>مكان الإصدار <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="issue-place-ar" value="خان يونس" required>
                </div>
                <div class="form-group">
                    <label>مكان الإصدار <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="issue-place-he" value="חן יונس" style="text-align: left; direction: ltr;" required>
                </div>

                <!-- تاريخ الإصدار -->
                <div class="form-group">
                    <label>تاريخ الإصدار <span class="lang-badge ar-badge">عربي</span></label>
                    <input type="text" id="issue-date-ar" value="10/11/2015" required>
                </div>
                <div class="form-group">
                    <label>تاريخ الإصدار <span class="lang-badge he-badge">עברית</span></label>
                    <input type="text" id="issue-date-he" value="10/11/2015" style="text-align: left; direction: ltr;" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">حفظ والذهاب لتصميم البطاقة الأمامية ◀</button>
        </form>
    </div>

    <script>
        let photoDataUrl = localStorage.getItem('id_photo') || '';

        // معالجة تغيير ملف الصورة والتحويل لـ Base64 لسهولة تخزينه
        document.getElementById('photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoDataUrl = event.target.result;
                    const preview = document.getElementById('photo-preview');
                    preview.src = photoDataUrl;
                    preview.style.display = 'block';
                    document.getElementById('upload-text').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // عند إرسال النموذج
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // تجميع كافة البيانات المدخلة
            const data = {
                idNumber: document.getElementById('id-number').value,
                
                firstNameAr: document.getElementById('first-name-ar').value,
                firstNameHe: document.getElementById('first-name-he').value,
                
                fatherNameAr: document.getElementById('father-name-ar').value,
                fatherNameHe: document.getElementById('father-name-he').value,
                
                grandNameAr: document.getElementById('grand-name-ar').value,
                grandNameHe: document.getElementById('grand-name-he').value,
                
                familyNameAr: document.getElementById('family-name-ar').value,
                familyNameHe: document.getElementById('family-name-he').value,
                
                motherNameAr: document.getElementById('mother-name-ar').value,
                motherNameHe: document.getElementById('mother-name-he').value,
                
                dobAr: document.getElementById('dob-ar').value,
                dobHe: document.getElementById('dob-he').value,
                
                pobAr: document.getElementById('pob-ar').value,
                pobHe: document.getElementById('pob-he').value,
                
                genderAr: document.getElementById('gender-ar').value,
                genderHe: document.getElementById('gender-he').value,
                
                religionAr: document.getElementById('religion-ar').value,
                religionHe: document.getElementById('religion-he').value,
                
                issuePlaceAr: document.getElementById('issue-place-ar').value,
                issuePlaceHe: document.getElementById('issue-place-he').value,
                
                issueDateAr: document.getElementById('issue-date-ar').value,
                issueDateHe: document.getElementById('issue-date-he').value
            };

            // الحفظ في LocalStorage
            localStorage.setItem('pal_id_data', JSON.stringify(data));
            if (photoDataUrl) {
                localStorage.setItem('id_photo', photoDataUrl);
            }

            // الانتقال لصفحة الواجهة الأمامية
            window.location.href = 'front.html';
        });

        // استعادة الصورة المحفوظة مسبقاً إن وجدت لتسهيل التجربة
        window.onload = function() {
            if (photoDataUrl) {
                const preview = document.getElementById('photo-preview');
                preview.src = photoDataUrl;
                preview.style.display = 'block';
                document.getElementById('upload-text').style.display = 'none';
            }
        }
    </script>
</body>
</html>
