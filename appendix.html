<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم وتحرير ملحق الهوية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Cairo', Arial, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px;
            color: #1e293b;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            color: #1b5e20;
            font-size: 20px;
            margin: 0;
            font-weight: 700;
        }

        /* أدوات التحرير المتقدمة */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media(min-width: 900px) {
            .editor-layout {
                grid-template-columns: 280px 1fr;
            }
        }

        .control-panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
        }

        .control-panel h3 {
            margin-top: 0;
            font-size: 15px;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #2e7d32;
        }

        /* أزرار التحريك الدقيق */
        .nudge-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 150px;
            margin: 15px auto;
        }

        .nudge-btn {
            background-color: #cbd5e1;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .nudge-btn:hover {
            background-color: #94a3b8;
        }

        .nudge-btn:active {
            background-color: #64748b;
            color: white;
        }

        /* مساحة العمل وملحق الهوية */
        .workspace-container {
            width: 100%;
            overflow-x: auto;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            background: #e2e8f0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .workspace {
            position: relative;
            width: 1000px;
            height: 300px; /* الارتفاع الدقيق المتوافق مع الملحق */
            background-image: url('1000009785.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        /* خصائص العناصر القابلة للسحب والخطوط */
        .draggable {
            position: absolute;
            cursor: move;
            user-select: none;
            padding: 1px 4px;
            border: 1px dashed transparent;
            text-align: right;
            direction: rtl;
            line-height: 1.1;
        }

        .ar-element {
            font-family: 'Arial', sans-serif;
            font-weight: bold; /* Arial Bold */
        }

        .he-element {
            font-family: 'Arial Hebrew', 'Arial', sans-serif;
            font-weight: bold; /* Arial Hebrew Bold */
        }

        .draggable.selected {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: 3px;
            z-index: 999;
        }

        .action-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-prev { background-color: #64748b; color: white; }
        .btn-prev:hover { background-color: #475569; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-save:hover { background-color: #218838; }

        .selected-indicator {
            font-size: 12px;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            background-color: #e8f5e9;
            padding: 6px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>الخطوة 3: تحرير وتعديل ملحق الهوية</h1>
        </header>

        <div class="editor-layout">
            <!-- لوحة التحكم -->
            <div class="control-panel">
                <h3>أدوات التعديل والتخصيص</h3>
                <div id="selected-indicator" class="selected-indicator">العنصر المحدد حالياً: <span id="active-el-name">لا يوجد</span></div>
                
                <div class="control-group">
                    <label>حجم الخط (بكسل):</label>
                    <input type="range" id="fontSize-ctrl" min="10" max="50" value="15">
                </div>
                <div class="control-group">
                    <label>الشفافية:</label>
                    <input type="range" id="opacity-ctrl" min="0" max="1" step="0.05" value="1">
                </div>
                <div class="control-group">
                    <label>تأثير التغبيش (Blur):</label>
                    <input type="range" id="blur-ctrl" min="0" max="5" step="0.1" value="0">
                </div>

                <!-- التحريك الدقيق بالبكسل -->
                <div class="control-group" style="text-align: center;">
                    <label>التحريك الدقيق (بكسل واحد):</label>
                    <div class="nudge-container">
                        <div></div>
                        <button class="nudge-btn" onclick="nudge('up')">▲</button>
                        <div></div>
                        <button class="nudge-btn" onclick="nudge('right')">▶</button>
                        <div style="font-size: 11px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#64748b;">اتجاه</div>
                        <button class="nudge-btn" onclick="nudge('left')">◀</button>
                        <div></div>
                        <button class="nudge-btn" onclick="nudge('down')">▼</button>
                        <div></div>
                    </div>
                </div>
            </div>

            <!-- مساحة العمل -->
            <div>
                <div class="workspace-container">
                    <div class="workspace" id="card-appendix-workspace">
                        <!-- العناصر يتم توليدها ديناميكياً هنا -->
                    </div>
                </div>

                <div class="action-btns">
                    <button class="btn btn-prev" onclick="window.location.href='front.html'">◀ رجوع لتعديل البطاقة الأمامية</button>
                    <button class="btn btn-save" onclick="saveImage()">💾 حفظ لقطة الشاشة للملحق</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeElement = null;
        const workspace = document.getElementById('card-appendix-workspace');

        // استعادة البيانات من local storage
        const storedData = localStorage.getItem('pal_id_data');

        if (!storedData) {
            alert('الرجاء تعبئة البيانات أولاً!');
            window.location.href = 'index.html';
        }

        const data = JSON.parse(storedData);

        // بناء الملحق والتوزيع المبدئي بدقة متناهية
        function buildAppendix() {
            const fields = [
                // رقم هوية صاحب البطاقة
                { text: data.idNumber, top: '55px', left: '810px', lang: 'ar', name: 'رقم الهوية' },
                
                // اسم العائلة
                { text: data.familyNameAr, top: '75px', left: '810px', lang: 'ar', name: 'اسم العائلة (عربي)' },
                { text: data.familyNameHe, top: '92px', left: '810px', lang: 'he', name: 'اسم العائلة (عبري)' },

                // الاسم الشخصي
                { text: data.firstNameAr, top: '120px', left: '810px', lang: 'ar', name: 'الاسم الشخصي (عربي)' },
                { text: data.firstNameHe, top: '137px', left: '810px', lang: 'he', name: 'الاسم الشخصي (عبري)' },

                // مكان الإقامة (العنوان)
                { text: data.pobAr, top: '165px', left: '810px', lang: 'ar', name: 'مكان السكن (عربي)' },
                { text: data.pobHe, top: '182px', left: '810px', lang: 'he', name: 'مكان السكن (عبري)' },

                // اسم البلدة
                { text: data.issuePlaceAr, top: '228px', left: '810px', lang: 'ar', name: 'البلدة (عربي)' },
                { text: data.issuePlaceHe, top: '245px', left: '810px', lang: 'he', name: 'البلدة (عبري)' }
            ];

            fields.forEach(f => {
                const div = document.createElement('div');
                div.className = `draggable ${f.lang === 'he' ? 'he-element' : 'ar-element'}`;
                div.innerText = f.text;
                div.style.top = f.top;
                div.style.left = f.left;
                div.style.fontSize = f.lang === 'he' ? '14px' : '15px';
                workspace.appendChild(div);
                makeDraggable(div, f.name);
            });
        }

        // جعل العناصر قابلة للسحب والتحديد (تدعم اللمس والماوس)
        function makeDraggable(elmnt, name) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            elmnt.addEventListener('mousedown', dragMouseDown);
            elmnt.addEventListener('touchstart', dragTouchStart, { passive: false });

            function selectEl() {
                if (activeElement) activeElement.classList.remove('selected');
                activeElement = elmnt;
                activeElement.classList.add('selected');
                
                document.getElementById('selected-indicator').style.display = 'block';
                document.getElementById('active-el-name').innerText = name;
                updateControls();
            }

            function dragMouseDown(e) {
                e.preventDefault();
                selectEl();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }

            // اللمس للهواتف
            function dragTouchStart(e) {
                selectEl();
                let touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.addEventListener('touchend', closeTouchDrag, { passive: false });
                document.addEventListener('touchmove', touchDrag, { passive: false });
            }

            function touchDrag(e) {
                e.preventDefault();
                let touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeTouchDrag() {
                document.removeEventListener('touchend', closeTouchDrag);
                document.removeEventListener('touchmove', touchDrag);
            }
        }

        // تحديث أشرطة التحكم
        function updateControls() {
            if (!activeElement) return;
            const style = window.getComputedStyle(activeElement);
            
            document.getElementById('fontSize-ctrl').value = parseFloat(style.fontSize);
            document.getElementById('opacity-ctrl').value = style.opacity;
            
            let blurVal = 0;
            const filter = style.filter;
            if (filter && filter !== 'none') {
                const match = filter.match(/blur\((.*?)\)/);
                if (match) blurVal = parseFloat(match[1]);
            }
            document.getElementById('blur-ctrl').value = blurVal;
        }

        document.getElementById('fontSize-ctrl').addEventListener('input', function() {
            if (activeElement) activeElement.style.fontSize = this.value + 'px';
        });

        document.getElementById('opacity-ctrl').addEventListener('input', function() {
            if (activeElement) activeElement.style.opacity = this.value;
        });

        document.getElementById('blur-ctrl').addEventListener('input', function() {
            if (activeElement) activeElement.style.filter = this.value > 0 ? `blur(${this.value}px)` : 'none';
        });

        // التحريك الدقيق (Nudging)
        function nudge(direction) {
            if (!activeElement) return;
            const step = 1;
            const top = activeElement.offsetTop;
            const left = activeElement.offsetLeft;

            if (direction === 'up') activeElement.style.top = (top - step) + 'px';
            if (direction === 'down') activeElement.style.top = (top + step) + 'px';
            if (direction === 'left') activeElement.style.left = (left - step) + 'px';
            if (direction === 'right') activeElement.style.left = (left + step) + 'px';
        }

        // ضبط قياس مساحة العمل تلقائياً ليناسب الهواتف
        function adjustWorkspaceScale() {
            const container = document.querySelector('.workspace-container');
            const ws = document.getElementById('card-appendix-workspace');
            const containerWidth = container.clientWidth;
            const baseWidth = 1000;

            if (containerWidth < baseWidth) {
                const scale = containerWidth / baseWidth;
                ws.style.transform = `scale(${scale})`;
                ws.style.transformOrigin = 'top right';
                container.style.height = (300 * scale + 30) + 'px';
            } else {
                ws.style.transform = 'none';
                container.style.height = 'auto';
            }
        }

        window.onload = function() {
            buildAppendix();
            adjustWorkspaceScale();
            setTimeout(adjustWorkspaceScale, 200);
        };
        window.onresize = adjustWorkspaceScale;

        // التقاط وحفظ الشاشة للملحق
        function saveImage() {
            if (activeElement) activeElement.classList.remove('selected');
            
            const btn = document.querySelector('.btn-save');
            btn.innerText = "جاري التقاط الشاشة وتحسينها...";
            btn.disabled = true;

            html2canvas(workspace, {
                scale: 2,
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ID_Appendix_${data.idNumber}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerText = "💾 حفظ لقطة الشاشة للملحق";
                btn.disabled = false;
            }).catch(err => {
                alert('حدث خطأ أثناء حفظ الصورة');
                btn.innerText = "💾 حفظ لقطة الشاشة للملحق";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
